name: "DogLog Replacer"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  replace:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Run AST Replacer
        run: ./gradlew runDogLogAST

      - name: Add DogLog vendordep
        run: ./gradlew vendordep --url=https://doglog.dev/vendordep.json

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin doglog
          git checkout doglog

          git add .
          git commit -m "Replace SmartDashboard with DogLog" || echo "No changes to commit"
          git push origin doglog
