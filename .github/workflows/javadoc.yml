name: "Javadoc Generator"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
on:
  push:
    branches:
      - main
  workflow_dispatch:
permissions:
  contents: write
jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 1.17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Build with Gradle
        run: ./gradlew build
      - name: Generate docs
        run: ./gradlew javadoc
      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp assets/javadoc/favicon.ico build/docs/javadoc/
          cp assets/logos/StuyPlusLogo.png build/docs/javadoc/
          git fetch origin docs
          git checkout docs
          cp -r build/docs/javadoc/. docs/
          git add docs/
          rm -rf build/ .gradle/
          git commit -m "DOCS: Automated documentation update from main" || echo "No changes to commit"
          git push origin docs